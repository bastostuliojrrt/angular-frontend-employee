<app-nav-bar></app-nav-bar>

<div class="d-flex flex-column text-center">
  <h3 class="mb-4">Update Employee</h3>

  <form
    [formGroup]="updateEmployeeForm"
    (ngSubmit)="onSubmit()"
    class="d-flex flex-column justify-content-center"
  >
    <div class="d-flex justify-content-center row">
      <div class="d-flex gap-2 col-8">
        <div class="col 4 form-group">
          <app-primary-input type="email" formControlName="emailId"
            ><span class="input-group-text" id="basic-addon1"
              >Email</span
            ></app-primary-input
          >
        </div>

        <div class="col 4 form-group">
          <app-primary-input type="text" formControlName="firstName"
            ><span class="input-group-text" id="basic-addon1"
              >First Name</span
            ></app-primary-input
          >
        </div>
      </div>

      <div class="d-flex gap-2 col-8 justify-content-center">
        <div class="col 4 form-group">
          <app-primary-input type="text" formControlName="lastName"
            ><span class="input-group-text" id="basic-addon1"
              >Last Name</span
            ></app-primary-input
          >
        </div>

        <div class="col 4 form-group">
          <app-primary-input type="text" formControlName="departamentId"
            ><span class="input-group-text" id="basic-addon1"
              >Departament</span
            ></app-primary-input
          >
        </div>
      </div>

      <div class="d-flex mt-3 col-8 justify-content-end">
        <button type="submit" class="col-2 btn btn-primary">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-floppy2-fill"
            viewBox="0 0 16 16"
          >
            <path d="M12 2h-2v3h2z" />
            <path
              d="M1.5 0A1.5 1.5 0 0 0 0 1.5v13A1.5 1.5 0 0 0 1.5 16h13a1.5 1.5 0 0 0 1.5-1.5V2.914a1.5 1.5 0 0 0-.44-1.06L14.147.439A1.5 1.5 0 0 0 13.086 0zM4 6a1 1 0 0 1-1-1V1h10v4a1 1 0 0 1-1 1zM3 9h10a1 1 0 0 1 1 1v5H2v-5a1 1 0 0 1 1-1"
            />
          </svg>
          Update
        </button>
      </div>
    </div>
  </form>
</div>

<div id="alert" class="alert-container start-50 translate-middle-x"></div>
